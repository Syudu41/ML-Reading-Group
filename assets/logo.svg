<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle — UofM Royal Blue -->
  <circle cx="100" cy="100" r="96" fill="#003087"/>
  <!-- Gold outer ring -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="#FDB927" stroke-width="5"/>
  <!-- Subtle inner ring -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#1A56DB" stroke-width="1.5" opacity="0.5"/>
  <!-- "ML" text — white -->
  <text
    x="100"
    y="118"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="62"
    font-weight="900"
    fill="#EEF2FF"
    letter-spacing="-2"
  >ML</text>
  <!-- "RG" subscript — UofM Gold -->
  <text
    x="100"
    y="148"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="22"
    font-weight="700"
    fill="#FDB927"
    letter-spacing="6"
  >RG</text>
</svg>
